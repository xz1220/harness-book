site_name: Harness Book
site_description: 从零手写最简 ReAct loop 并自举到完整 agent harness
site_url: https://xz1220.github.io/harness-book/

repo_url: https://github.com/xz1220/harness-book
repo_name: xz1220/harness-book
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: white
      accent: indigo

extra:
  generator: false

nav:
  - 首页: index.md
  - 第 0 章 什么是 harness: 00-what-is-a-harness.md
  - 第 1 章 最简 ReAct loop: 01-minimal-react-loop.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - toc:
      permalink: true
