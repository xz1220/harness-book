site_name: Harness Book
site_description: 从零手写最简 ReAct loop 并自举到完整 agent harness
site_url: https://xz1220.github.io/harness-book/

repo_url: https://github.com/xz1220/harness-book
repo_name: xz1220/harness-book
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: white
      accent: indigo

extra:
  generator: false

nav:
  - 首页: index.md
  - 第 1 章 最简 ReAct loop: 01-minimal-react-loop.md
  - 第 2 章 工具系统: 02-tool-system.md
  - 第 3 章 自举：harness 改自己: 03-self-bootstrap.md
  - 第 4 章 Permission 与 sandbox: 04-permission-sandbox.md
  - 第 5 章 上下文与记忆: 05-context-memory.md
  - 第 6 章 完整 harness: 06-complete-harness.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - toc:
      permalink: true
